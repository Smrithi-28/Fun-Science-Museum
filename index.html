<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Science Museum</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#d8cfce;
}

.container{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    font-size:72px;
    font-weight:900;
    color:black;
    margin-bottom:40px;
}

.gallery-box{
    width:85%;
    max-width:1400px;
    background:#d8cfce;
    border:4px solid #f2f2f2;
    border-radius:30px;
    padding:40px;
}

.gallery-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    background:white;
    text-decoration:none;
    color:black;
    border-radius:20px;
    padding:30px;
    text-align:center;
    font-size:28px;
    font-weight:700;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.did-you-know{
    margin-top:35px;
    text-align:center;
}

.did-you-know a{
    text-decoration:none;
    color:black;
    font-size:34px;
    font-weight:800;
}

.did-you-know a:hover{
    color:#444;
}

</style>
</head>
<body>

<div class="container">

    <h1>Fun Science Museum</h1>

    <div class="gallery-box">

        <div class="gallery-grid">

            <a class="card" href="grand-shuttle.html">
                Grand Shuttle
            </a>

            <a class="card" href="linear-perspective.html">
                Linear Perspective
            </a>

            <a class="card" href="topo-terrain.html">
                Topo Terrain
            </a>

            <a class="card" href="how-fast-you-are.html">
                How Fast You Are?
            </a>

            <a class="card" href="humming-the-song.html">
                Humming The Song
            </a>

            <a class="card" href="rock-paper-scissor.html">
                Rock-Paper-Scissor
            </a>

        </div>

        <div class="did-you-know">
            <a href="did-you-know.html">
                Did You Know? - Fun Science Facts
            </a>
        </div>

    </div>

</div>

</body>
</html>
