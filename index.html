<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Science Museum</title>

<style>
/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#d8cfce;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* MAIN WRAPPER */
.container{
    width:100%;
    max-width:1200px;
    text-align:center;
}

/* TITLE */
h1{
    font-size:clamp(32px, 5vw, 72px);
    font-weight:900;
    margin-bottom:25px;
    color:#000;
}

/* BOX */
.gallery-box{
    background:#d8cfce;
    border:4px solid #f2f2f2;
    border-radius:25px;
    padding:clamp(15px, 3vw, 40px);
}

/* GRID */
.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
    gap:20px;
}

/* CARD */
.card{
    background:#fff;
    text-decoration:none;
    color:#000;
    border-radius:18px;
    padding:20px;
    font-size:clamp(16px, 2vw, 24px);
    font-weight:700;
    transition:0.3s ease;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100px;
}

.card:hover{
    transform:translateY(-5px) scale(1.03);
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* BOTTOM LINK */
.did-you-know{
    margin-top:25px;
}

.did-you-know a{
    text-decoration:none;
    color:#000;
    font-size:clamp(18px, 2.5vw, 34px);
    font-weight:800;
    display:inline-block;
    transition:0.3s;
}

.did-you-know a:hover{
    color:#444;
}

/* MOBILE FIX */
@media (max-width:600px){
    .gallery-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>Fun Science Museum</h1>

    <div class="gallery-box">

        <div class="gallery-grid">

            <a class="card" href="grand-shuttle.html">
                Grand Shuttle
            </a>

            <a class="card" href="linear-perspective.html">
                Linear Perspective
            </a>

            <a class="card" href="topo-terrain.html">
                Topo Terrain
            </a>

            <a class="card" href="how-fast-you-are.html">
                How Fast You Are?
            </a>

            <a class="card" href="humming-the-song.html">
                Humming The Song
            </a>

            <a class="card" href="rock-paper-scissor.html">
                Rock-Paper-Scissor
            </a>

        </div>

        <div class="did-you-know">
            <a href="did-you-know.html">
                Did You Know? - Fun Science Facts
            </a>
        </div>

    </div>

</div>

</body>
</html>
