<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>रेषीय परिप्रेक्ष्य</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:#e3dad7;
}

.navbar{
    height:70px;
    background:#1e40af;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
}

.navbar a,
.navbar button{
    text-decoration:none;
    border:none;
    background:white;
    color:#1e40af;
    padding:10px 20px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}



.slide{
    height:calc(100vh - 70px);
    width:100%;
}

.slide img{
    width:100%;
    height:100%;
    object-fit:contain;
}
</style>
</head>
<body>

<div class="navbar">

<a href="../index-marathi.html">🏠 Home</a>

<a href="../marathihtml/marathigrand-shuttle.html">⏮ Prev</a>

<button id="playBtn" onclick="toggleAudio()">
▶ Play
</button>

<button onclick="stopAudio()">
⏹ Stop
</button>

<a href="../marathihtml/marathitopo-terrain.html">⏭ Next</a>

</div>

<div class="slide">
<img src="../images/marathiimages/mperp.jpg" alt="Grand">
</div>

<audio id="audio">
<source src="../audio/marathi/marathi_linearperspective.mp3" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");

function toggleAudio(){

    if(audio.paused){
        audio.play();
        playBtn.innerHTML = "⏸ Pause";
    }
    else{
        audio.pause();
        playBtn.innerHTML = "▶ Play";
    }

}

function stopAudio(){

    audio.pause();
    audio.currentTime = 0;
    playBtn.innerHTML = "▶ Play";

}

audio.addEventListener("ended",function(){
    playBtn.innerHTML = "▶ Play";
});

</script>

</body>
</html>
